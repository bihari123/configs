# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

# Change prefix to Ctrl+g
unbind C-b
set -g prefix C-g
bind C-g send-prefix

# Mouse support
set -g mouse on

# Session persistence
set -g @continuum-restore 'on'

# Logging
set -g @logging-path "$HOME/.tmux/logs"
set -g @screen-capture-path "$HOME/.tmux/logs"
set -g @save-complete-history-path "$HOME/.tmux/logs"

# Splits and new windows use current path
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind c new-window -c '#{pane_current_path}'

# Local plugins
run-shell "$HOME/configs/tmux/plugins/tmux-logger/logger.tmux"
run-shell "$HOME/configs/tmux/plugins/tmux-ui/ui.tmux"
run-shell "$HOME/configs/tmux/plugins/tmux-quick-ssh/quick-ssh.tmux"
run-shell "$HOME/configs/tmux/plugins/tmux-scratch/scratch.tmux"
run-shell "$HOME/configs/tmux/plugins/tmux-pomodoro/pomodoro.tmux"
run-shell "$HOME/configs/tmux/plugins/tmux-vibes/vibes.tmux"

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
